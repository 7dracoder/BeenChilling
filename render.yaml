services:
  - type: web
    name: clearchill
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fridge_observer.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: ENVIRONMENT
        value: production
