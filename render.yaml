services:
  - type: web
    name: clearchill
    runtime: python
    plan: free
    buildCommand: |
      python --version
      pip install --upgrade pip
      pip install pydantic==2.10.4 pydantic-core==2.27.2 --only-binary=:all:
      pip install -r requirements.txt
    startCommand: uvicorn fridge_observer.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: ENVIRONMENT
        value: production
    # System packages needed for Pillow and OpenCV
    buildFilter:
      paths:
        - requirements.txt
        - fridge_observer/**
