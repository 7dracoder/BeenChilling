<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Ice cube with gradient -->
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F7FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B3E5FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81D4FA;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Ice cube shape -->
  <rect x="15" y="15" width="70" height="70" rx="12" fill="url(#iceGrad)" stroke="#4FC3F7" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Shine effect -->
  <path d="M 25 25 L 45 25 L 35 35 Z" fill="white" opacity="0.6"/>
  <path d="M 55 45 L 75 45 L 65 55 Z" fill="white" opacity="0.4"/>
  
  <!-- Frost crystals -->
  <circle cx="35" cy="50" r="3" fill="white" opacity="0.7"/>
  <circle cx="65" cy="60" r="2" fill="white" opacity="0.7"/>
  <circle cx="50" cy="70" r="2.5" fill="white" opacity="0.7"/>
</svg>
